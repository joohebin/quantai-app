<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>点击测试</title>
<style>
body { background: #0A1628; color: #fff; font-family: monospace; padding: 20px; }
button { background: #00C896; color: #000; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-size: 16px; margin: 8px; }
#log { background: #1a2a40; padding: 16px; border-radius: 8px; margin-top: 20px; min-height: 100px; }
</style>
</head>
<body>
<h2>🧪 点击响应测试</h2>
<button onclick="testClick('A')">按钮 A</button>
<button onclick="testClick('B')">按钮 B</button>
<button onclick="testClick('C')">按钮 C</button>
<div id="log">点击上方按钮，这里会显示响应...</div>
<script>
function testClick(name) {
  const log = document.getElementById('log');
  log.innerHTML += '<br>✅ 按钮 ' + name + ' 被点击了！时间: ' + new Date().toLocaleTimeString();
}
// 自动测试
window.onload = function() {
  document.getElementById('log').innerHTML = '✅ JS 正常加载！时间: ' + new Date().toLocaleTimeString();
};
</script>
</body>
</html>
